<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HepsiHikaye</title>
    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <!-- Custom CSS -->
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>
    <!-- Navigation -->
    <nav class="navbar navbar-expand-lg navbar-light" style="background-color: #E57373;">
        <div class="container">
            <a class="navbar-brand text-white" href="{{ url_for('index') }}">HepsiHikaye</a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav">
                    <li class="nav-item">
                        <a class="nav-link text-white" href="{{ url_for('index') }}">Ana Sayfa</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link text-white" href="{{ url_for('category', category='öykü') }}">Öykü</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link text-white" href="{{ url_for('category', category='roman') }}">Roman</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link text-white" href="{{ url_for('category', category='şiir') }}">Şiir</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link text-white" href="{{ url_for('category', category='deneme') }}">Deneme</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link text-white" href="{{ url_for('category', category='makale') }}">Makale</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link text-white" href="{{ url_for('category', category='haber') }}">Haber</a>
                    </li>
                </ul>
            </div>
        </div>
    </nav>

    <!-- Subtitle -->
    <div class="bg-light py-2">
        <div class="container">
            <p class="text-center mb-0">Kafamızda Çok Kuruyoruz</p>
        </div>
    </div>

    <!-- Content -->
    <div class="container mt-4">
        {% block content %}{% endblock %}
    </div>

    <!-- Footer -->
    <footer class="bg-light py-4 mt-5">
        <div class="container">
            <p class="text-center mb-0"> 2025 HepsiHikaye. Tüm hakları saklıdır.</p>
            <p class="text-center mb-0 text-muted">KAFAMIZDA ÇOK KURUYORUZ</p>
        </div>
    </footer>

    <!-- Bootstrap Bundle with Popper -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/js/bootstrap.bundle.min.js"></script>
    {% block scripts %}{% endblock %}
    
    <!-- Rating functionality -->
    <script>
    document.addEventListener('DOMContentLoaded', function() {
        const ratingButtons = document.querySelectorAll('.rating-btn');
        
        ratingButtons.forEach(button => {
            button.addEventListener('click', function() {
                const postId = this.dataset.postId;
                const action = this.dataset.action;
                
                fetch(`/rate/${postId}/${action}`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                })
                .then(response => response.json())
                .then(data => {
                    if (data.success) {
                        // Update likes and dislikes count
                        const post = this.closest('.rating-section');
                        post.querySelector('.likes-count').textContent = data.likes;
                        post.querySelector('.dislikes-count').textContent = data.dislikes;
                        
                        // Show success message
                        alert('Oyunuz kaydedildi!');
                    } else {
                        alert(data.message || 'Bir hata oluştu.');
                    }
                })
                .catch(error => {
                    console.error('Error:', error);
                    alert('Bir hata oluştu.');
                });
            });
        });
    });
    </script>
</body>
</html>
