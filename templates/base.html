<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HEPSİHİKAYE - Kafamızda Çok Kuruyoruz</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;500&display=swap" rel="stylesheet">
</head>
<body>
    <header class="site-header">
        <div class="container text-center">
            <h1 class="site-title">HEPSİHİKAYE</h1>
            <p class="site-subtitle">Kafamızda Çok Kuruyoruz</p>
            
            <nav class="main-nav">
                <a href="{{ url_for('index') }}" class="nav-link {% if request.endpoint == 'index' %}active{% endif %}">Ana Sayfa</a>
                <a href="{{ url_for('category', category='öykü') }}" class="nav-link {% if active_category == 'öykü' %}active{% endif %}">Öykü</a>
                <a href="{{ url_for('category', category='roman') }}" class="nav-link {% if active_category == 'roman' %}active{% endif %}">Roman</a>
                <a href="{{ url_for('category', category='şiir') }}" class="nav-link {% if active_category == 'şiir' %}active{% endif %}">Şiir</a>
                <a href="{{ url_for('category', category='deneme') }}" class="nav-link {% if active_category == 'deneme' %}active{% endif %}">Deneme</a>
                <a href="{{ url_for('category', category='makale') }}" class="nav-link {% if active_category == 'makale' %}active{% endif %}">Makale</a>
                <a href="{{ url_for('category', category='haber') }}" class="nav-link {% if active_category == 'haber' %}active{% endif %}">Haber</a>
                <a href="{{ url_for('category', category='video') }}" class="nav-link {% if active_category == 'video' %}active{% endif %}">Video</a>
            </nav>
        </div>
    </header>

    <div class="container mt-4">
        {% block content %}{% endblock %}
    </div>

    <footer class="site-footer">
        <div class="container text-center">
            <p>&copy; {{ current_year }} HepsiHikaye. Tüm hakları saklıdır.</p>
            <p class="footer-subtitle">KAFAMIZDA ÇOK KURUYORUZ</p>
        </div>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
