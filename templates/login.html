<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HepsiHikaye Admin - Giriş</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body {
            background-color: #f8f9fa;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .login-container {
            max-width: 400px;
            width: 100%;
            padding: 20px;
        }
        .card {
            border: none;
            box-shadow: 0 0 20px rgba(0,0,0,0.1);
        }
        .site-title {
            color: #E86D5C;
            font-size: 24px;
            font-weight: 500;
            text-align: center;
            margin-bottom: 30px;
        }
        .btn-primary {
            background-color: #E86D5C;
            border-color: #E86D5C;
        }
        .btn-primary:hover {
            background-color: #d85c4b;
            border-color: #d85c4b;
        }
    </style>
</head>
<body>
    <div class="login-container">
        <h1 class="site-title">HEPSİHİKAYE</h1>
        <div class="card">
            <div class="card-body p-4">
                <h3 class="card-title text-center mb-4">Admin Girişi</h3>
                
                {% with messages = get_flashed_messages(with_categories=true) %}
                    {% if messages %}
                        {% for category, message in messages %}
                            <div class="alert alert-{{ 'success' if category == 'success' else 'danger' }} mb-3">
                                {{ message }}
                            </div>
                        {% endfor %}
                    {% endif %}
                {% endwith %}

                <form method="POST" action="{{ url_for('login', next=request.args.get('next', '')) }}">
                    {{ csrf_token() }}
                    <div class="mb-3">
                        <label for="username" class="form-label">Kullanıcı Adı</label>
                        <input type="text" class="form-control" id="username" name="username" required>
                    </div>
                    <div class="mb-3">
                        <label for="password" class="form-label">Şifre</label>
                        <input type="password" class="form-control" id="password" name="password" required>
                    </div>
                    <button type="submit" class="btn btn-primary w-100">Giriş Yap</button>
                </form>
            </div>
        </div>
    </div>
</body>
</html>
