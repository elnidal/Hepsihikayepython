{% extends "base.html" %}

{% block content %}
<div class="container">
    <h2 class="mb-4">{{ category_name }}</h2>
    
    {% if posts %}
        <div class="row">
            {% for post in posts %}
            <div class="col-12 mb-4">
                <div class="card">
                    <div class="card-body">
                        <h3 class="card-title">{{ post.title }}</h3>
                        <div class="card-text">{{ post.content|safe }}</div>
                        <p class="card-text mt-3">
                            <small class="text-muted">{{ post.created_at.strftime('%Y-%m-%d %H:%M') }}</small>
                        </p>
                    </div>
                </div>
            </div>
            {% endfor %}
        </div>
    {% else %}
        <div class="text-center empty-message">
            <p>Bu kategoride henüz içerik bulunmamaktadır.</p>
        </div>
    {% endif %}
</div>
{% endblock %}
